<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>💰 Expense Tracker</h2>

    <div class="balance">
        <h3>Your Balance</h3>
        <h1 id="balance">₹0.00</h1>
    </div>

    <div class="inc-exp">
        <div>
            <h4>Income</h4>
            <p id="money-plus" class="plus">+₹0.00</p>
        </div>
        <div>
            <h4>Expense</h4>
            <p id="money-minus" class="minus">-₹0.00</p>
        </div>
    </div>

    <h3>Add New Transaction</h3>
    <form id="form">
        <input type="text" id="text" placeholder="Enter description" required>
        <input type="number" id="amount" placeholder="Enter amount (+income, -expense)" required>
        <button class="btn">Add Transaction</button>
    </form>

    <h3>History</h3>
    <ul id="list" class="list"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
